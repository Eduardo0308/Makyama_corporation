<div class="tarefas">

<h3>Tarefas</h3>


<div class="area-tarefa">

<textarea
id="novaTarefa"
placeholder="Digite a tarefa"
></textarea>


<button onclick="adicionarTarefa()">
Adicionar
</button>

</div>


<ul id="listaTarefas"></ul>

</div>

</div>

</div>

</section>



<script>

function adicionarTarefa(){

let texto =
document.getElementById("novaTarefa").value;

if(texto == "") return;

criarTarefa(texto);

document.getElementById("novaTarefa").value = "";

salvarTarefas();

}


function criarTarefa(texto){

let li =
document.createElement("li");

li.innerHTML = `

<textarea 
class="texto-tarefa"
oninput="salvarTarefas()"
>${texto}</textarea>

<button 
class="btn-remover"
onclick="removerTarefa(this)">
X
</button>

`;

document
.getElementById("listaTarefas")
.appendChild(li);

}


function removerTarefa(botao){

botao.parentElement.remove();

salvarTarefas();

}


function salvarTarefas(){

let tarefas = [];

document
.querySelectorAll(".texto-tarefa")
.forEach(function(t){

tarefas.push(t.value);

});

localStorage.setItem(
"tarefas",
JSON.stringify(tarefas)
);

}


function carregarTarefas(){

let tarefas =
JSON.parse(localStorage.getItem("tarefas"));

if(!tarefas) return;

tarefas.forEach(function(t){

criarTarefa(t);

});

}


carregarTarefas();

</script>

<script>
window.addEventListener("DOMContentLoaded", function(){

    const logo = document.querySelector(".logo-canto");

    if(!logo) return;

    window.addEventListener("scroll", function(){

        if(window.scrollY > 50){
            logo.classList.add("logo-sumir");
        } else {
            logo.classList.remove("logo-sumir");
        }

    });

});
</script>
