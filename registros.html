<script>

/* ADICIONAR REGISTRO */
function adicionarRegistro(){

let titulo = document.getElementById("tituloRegistro").value;
let conteudo = document.getElementById("conteudoRegistro").value;

if(titulo === "" || conteudo === "") return;

criarRegistro(titulo, conteudo);

document.getElementById("tituloRegistro").value = "";
document.getElementById("conteudoRegistro").value = "";

salvarRegistros();

}


/* CRIAR REGISTRO */
function criarRegistro(titulo, conteudo){

let li = document.createElement("li");

li.classList.add("registro");

li.innerHTML = `
<div class="registro-titulo" onclick="toggleRegistro(this)">
${titulo}
</div>

<div class="registro-conteudo">

<textarea class="texto-tarefa" oninput="salvarRegistros()">${conteudo}</textarea>

<button onclick="removerRegistro(this)">Excluir</button>

</div>
`;

document.getElementById("listaRegistros").appendChild(li);

}


/* ABRIR / FECHAR */
function toggleRegistro(elemento){

let conteudo = elemento.nextElementSibling;

conteudo.style.display =
conteudo.style.display === "block" ? "none" : "block";

}


/* REMOVER */
function removerRegistro(botao){

botao.closest("li").remove();

salvarRegistros();

}


/* SALVAR */
function salvarRegistros(){

let registros = [];

document.querySelectorAll(".registro").forEach(function(r){

// 🔒 IGNORA FIXOS
if(r.classList.contains("fixa")) return;

let titulo = r.querySelector(".registro-titulo").innerText;
let conteudo = r.querySelector(".texto-tarefa").value;

registros.push({
titulo: titulo,
conteudo: conteudo
});

});

localStorage.setItem("registros", JSON.stringify(registros));

}


/* CARREGAR */
function carregarRegistros(){

let registros = JSON.parse(localStorage.getItem("registros"));

if(!registros) return;

registros.forEach(function(r){
criarRegistro(r.titulo, r.conteudo);
});

}


/* EXECUTA AO ABRIR */
window.onload = function(){
carregarRegistros();
};

</script>

<script>

            logo.classList.remove("logo-sumir");

});

</script>
